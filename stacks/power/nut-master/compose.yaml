name: nut-master

# NUT master — USB driver + upsd + upsmon (instantlinux/nut-upsd runs upsmon -F after upsd starts).
# Pair with stacks/power/nut-slave/ on other LAN hosts that share the same UPS power.
# Graceful shutdown of the Docker *host* requires SHUTDOWNCMD / privileges — see README (optional pid: host, local/upsmon.conf).

services:
  nut-master:
    image: ${NUT_IMAGE:-instantlinux/nut-upsd:latest}
    restart: unless-stopped
    privileged: true
    # Uncomment on a dedicated NUT Pi so upsmon's SHUTDOWNCMD halts the machine, not only the container namespace.
    # pid: host
    env_file:
      - path: .env
        required: false
    environment:
      API_USER: ${NUT_API_USER:-upsmon}
      API_PASSWORD: ${NUT_API_PASSWORD:?set_NUT_API_PASSWORD_in_env}
      NAME: ${NUT_UPS_NAME:-ups}
      DRIVER: ${NUT_DRIVER:-usbhid-ups}
      SERIAL: ${NUT_SERIAL:-}
      PORT: ${NUT_PORT:-auto}
      MAXAGE: ${NUT_MAXAGE:-25}
      VENDORID: ${NUT_VENDORID:-}
      DESCRIPTION: ${NUT_DESCRIPTION:-homelab UPS}
      NUT_DEBUG_LEVEL: ${NUT_DEBUG_LEVEL:-0}
    ports:
      - "${NUT_UPSD_PORT:-3493}:3493"
    volumes:
      - type: bind
        source: ${NUT_LOCAL_CONF_DIR:-./local}
        target: /etc/nut/local
    devices:
      - /dev/bus/usb:/dev/bus/usb
    networks:
      - nut-net

networks:
  nut-net:
    driver: bridge
