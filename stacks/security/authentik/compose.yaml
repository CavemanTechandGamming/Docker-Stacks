name: authentik

# Adapted from https://goauthentik.io/version/2025.10/docker-compose.yml (PostgreSQL + server + worker).

services:
  postgresql:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    networks:
      - authentik-net
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?set_PG_PASS_in_env}
    volumes:
      - authentik-database:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -d \"$${POSTGRES_DB}\" -U \"$${POSTGRES_USER}\"",
        ]
      interval: 30s
      retries: 5
      start_period: 20s
      timeout: 5s

  server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.4}
    restart: unless-stopped
    networks:
      - authentik-net
    command: server
    env_file:
      - path: .env
        required: false
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:?set_PG_PASS_in_env}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set_AUTHENTIK_SECRET_KEY_in_env}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - ./media:/media
      - ./certs:/certs
      - ./custom-templates:/templates
    ports:
      - "${AUTHENTIK_HTTP_PORT:-9000}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-9443}:9443"
    depends_on:
      postgresql:
        condition: service_healthy

  worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server}:${AUTHENTIK_TAG:-2025.10.4}
    restart: unless-stopped
    user: root
    networks:
      - authentik-net
    command: worker
    env_file:
      - path: .env
        required: false
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:?set_PG_PASS_in_env}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set_AUTHENTIK_SECRET_KEY_in_env}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./media:/media
      - ./certs:/certs
      - ./custom-templates:/templates
    depends_on:
      postgresql:
        condition: service_healthy

networks:
  authentik-net:
    driver: bridge

volumes:
  authentik-database:
