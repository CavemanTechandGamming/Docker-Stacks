name: ollama-open-webui

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - llm-net
    # Uncomment if your Docker host has NVIDIA runtime configured.
    # gpus: all

  open-webui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:main}
    restart: unless-stopped
    depends_on:
      - ollama
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-me-to-a-long-random-string}
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - llm-net

volumes:
  ollama-data:
  open-webui-data:

networks:
  llm-net:
    driver: bridge
