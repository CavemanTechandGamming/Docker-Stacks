name: paperclip

# Paperclip — agent orchestration / control plane with web UI (quickstart-style single container).
# Upstream quickstart embeds PostgreSQL data under the persisted /paperclip directory.

services:
  paperclip:
    image: ${PAPERCLIP_IMAGE:-ghcr.io/paperclipai/paperclip:latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:?set PAPERCLIP_PUBLIC_URL in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET in .env}
    volumes:
      - paperclip-data:/paperclip
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    networks:
      - paperclip-net

volumes:
  paperclip-data:

networks:
  paperclip-net:
    driver: bridge
