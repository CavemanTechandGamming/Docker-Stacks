name: caddy

# Standalone reverse proxy / TLS termination — keep separate from DNS (Pi-hole + Unbound).

services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTP3_UDP_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_DATA_DIR:-./data}:/data
      - ${CADDY_CONFIG_DIR:-./config}:/config
    networks:
      - edge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  edge:
    name: ${EDGE_NETWORK_NAME:-homelab_edge}
    driver: bridge
