name: uptime-kuma

services:
  uptime-kuma:
    image: ${UPTIME_KUMA_IMAGE:-louislam/uptime-kuma:1}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - uptime-kuma-data:/app/data
    ports:
      - "${UPTIME_KUMA_HTTP_PORT:-3001}:3001"
    networks:
      - uptime-kuma-net

volumes:
  uptime-kuma-data:

networks:
  uptime-kuma-net:
    driver: bridge
