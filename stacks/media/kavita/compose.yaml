name: kavita

services:
  kavita:
    image: ${KAVITA_IMAGE:-lscr.io/linuxserver/kavita:latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    ports:
      - "${KAVITA_PORT:-5000}:5000"
    volumes:
      - ${KAVITA_CONFIG_DIR:-./config}:/config
      - ${KAVITA_DATA_DIR:-./data}:/data
