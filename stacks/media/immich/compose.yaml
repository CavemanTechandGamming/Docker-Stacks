name: immich

# Google Photos–style self-hosted library. Upstream reference:
# https://docs.immich.app/install/docker-compose

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
      DB_HOSTNAME: database
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME:-immich}
      REDIS_HOSTNAME: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "${IMMICH_PORT:-2283}:2283"
    volumes:
      - immich-library:/data
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      - immich-net

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - immich-model-cache:/cache
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      - immich-net

  redis:
    image: ${VALKEY_IMAGE:-docker.io/valkey/valkey:9-alpine}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immich-net

  database:
    image: ${IMMICH_POSTGRES_IMAGE:-ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - immich-postgres:/var/lib/postgresql/data
    shm_size: "128mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - immich-net

volumes:
  immich-library:
  immich-postgres:
  immich-model-cache:

networks:
  immich-net:
    driver: bridge
