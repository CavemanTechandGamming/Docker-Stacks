name: minio

# MinIO — S3-compatible object storage (research row #58).

services:
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-01-20T14-49-07Z}
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - path: .env
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set_MINIO_ROOT_USER_in_env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set_MINIO_ROOT_PASSWORD_in_env}
    volumes:
      - ${MINIO_DATA_DIR:-./data}:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - minio-net

networks:
  minio-net:
    driver: bridge
