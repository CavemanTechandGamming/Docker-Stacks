name: stack-template

services:
  app:
    image: ghcr.io/example/app:1.0.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    ports:
      - "${APP_PORT}:8080"
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - app-net

volumes:
  app-data:

networks:
  app-net:
    driver: bridge
