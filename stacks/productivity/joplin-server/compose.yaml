name: joplin-server

# Joplin Server — sync backend for Joplin clients (research row #245).

services:
  db:
    image: ${JOPLIN_POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${JOPLIN_POSTGRES_DB:-joplin}
      POSTGRES_USER: ${JOPLIN_POSTGRES_USER:-joplin}
      POSTGRES_PASSWORD: ${JOPLIN_POSTGRES_PASSWORD:?set_JOPLIN_POSTGRES_PASSWORD_in_env}
    volumes:
      - joplin-server-pgdata:/var/lib/postgresql/data
    networks:
      - joplin-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${JOPLIN_POSTGRES_USER:-joplin} -d ${JOPLIN_POSTGRES_DB:-joplin}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  joplin:
    image: ${JOPLIN_SERVER_IMAGE:-joplin/server:2}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      APP_PORT: 22300
      APP_BASE_URL: ${JOPLIN_BASE_URL:?set_JOPLIN_BASE_URL_in_env}
      DB_CLIENT: pg
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${JOPLIN_POSTGRES_DB:-joplin}
      POSTGRES_USER: ${JOPLIN_POSTGRES_USER:-joplin}
      POSTGRES_PASSWORD: ${JOPLIN_POSTGRES_PASSWORD:?set_JOPLIN_POSTGRES_PASSWORD_in_env}
    ports:
      - "${JOPLIN_PORT:-22300}:22300"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:22300/ >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - joplin-net

volumes:
  joplin-server-pgdata:

networks:
  joplin-net:
    driver: bridge
