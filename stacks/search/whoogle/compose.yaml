name: whoogle

# Layout derived from upstream docker-compose:
# https://github.com/benbusby/whoogle-search/blob/main/docker-compose.yml

services:
  whoogle-search:
    image: docker.io/benbusby/whoogle-search:${WHOOGLE_VERSION:-1.2.4}
    restart: unless-stopped
    pids_limit: 50
    mem_limit: 256mb
    memswap_limit: 256mb
    user: whoogle
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    tmpfs:
      - /config:size=10M,uid=927,gid=927,mode=1700
      - /var/lib/tor:size=15M,uid=927,gid=927,mode=1700
      - /run/tor:size=1M,uid=927,gid=927,mode=1700
    env_file:
      - path: .env
        required: false
    ports:
      - "${WHOOGLE_PUBLISH_PORT:-5000}:5000"
    networks:
      - whoogle-net
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

networks:
  whoogle-net:
    driver: bridge
